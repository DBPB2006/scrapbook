<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Friends - MemoryBook</title>
    <link rel="stylesheet" href="/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        html, body { font-family: 'Quicksand', sans-serif; } 
        .font-kalam { font-family: 'Kalam', cursive !important; }
        .blobs-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fafafa; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#F5F3FB] via-[#FDFCFC] to-[#F4F8FD] min-h-screen">
<div class="blobs-bg"></div>
<div id="navbar-container"></div>
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
        <h1 class="text-3xl sm:text-4xl font-semibold text-[#2D2A3D] mb-2">Your Friends</h1>
        <p class="text-lg text-[#6B6B7D]">Manage and explore your friendship network</p>
    </div>
    <div class="flex justify-end mb-6">
        <a href="/friends/add_friend.html" class="bg-[#8B7EC8] text-white px-6 py-3 rounded-lg hover:bg-[#7A6BB5] transition font-medium flex items-center gap-2"><i class="fas fa-user-plus"></i> Add Another Friend</a>
    </div>
    
    <div id="loading" class="text-gray-500 mt-10 text-xl text-center">Loading friends...</div>
    
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden" id="friendsGrid">
        <!-- Friends populated here -->
    </div>
    
    <div id="noFriends" class="col-span-2 md:col-span-3 lg:col-span-4 text-center py-16 hidden">
        <div class="max-w-md mx-auto">
            <i class="fas fa-users text-[#6B6B7D] text-6xl mx-auto mb-6"></i>
            <h3 class="text-xl font-semibold text-[#2D2A3D] mb-2">No Friends Found</h3>
            <p class="text-[#6B6B7D] mb-6">Start building your friendship network by adding your first friend.</p>
            <a href="/friends/add_friend.html" class="bg-[#8B7EC8] text-white px-6 py-3 rounded-lg hover:bg-[#7A6BB5] transition font-medium">Add Your First Friend</a>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/app.js"></script>
<script src="/js/client_view_friends.js"></script>
</body>
</html>
