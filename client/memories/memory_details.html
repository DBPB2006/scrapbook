<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memory Details - MemoryBook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        html, body { font-family: 'Quicksand', sans-serif; }
        .font-kalam { font-family: 'Kalam', cursive !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .delete-btn {
            background: #b91c1c; color: #fff; border: none; border-radius: 12px;
            padding: 10px 22px; font-size: 1rem; font-weight: bold;
            box-shadow: 0 2px 8px rgba(185,28,28,0.15); display: flex; align-items: center;
            gap: 8px; cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
        }
        .delete-btn:hover { background: #7f1d1d; box-shadow: 0 4px 16px rgba(185,28,28,0.25); }
        .blobs-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fafafa; }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-pink-50 min-h-screen overflow-x-hidden flex flex-col">
    <div class="blobs-bg"></div>
    <header class="bg-white/80 backdrop-blur-md border-b border-[#E8E3F5] sticky top-0 z-50 shadow-sm">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <a href="/dashboard.html" class="text-[#8B7EC8] font-semibold hover:underline">&larr; Back to Dashboard</a>
            <button onclick="logout()" class="text-[#F48498] hover:text-[#8B7EC8] font-medium">Logout</button>
        </nav>
    </header>
    <div class="flex flex-1">
        <aside class="w-24 flex flex-col items-center py-8 px-2 z-10 bg-white/80 rounded-tr-3xl rounded-br-3xl shadow-lg border-r border-[#e0e0f0]">
            <a id="prevLink" href="#" class="mb-6 flex items-center justify-center w-10 h-10 rounded-full bg-[#8B7EC8] text-white hover:bg-[#6B6B7D] transition opacity-40 pointer-events-none" style="margin-top: 12px;" title="Previous Memory">
                <i class="fas fa-chevron-up"></i>
            </a>
            <div id="timelineContainer" class="flex flex-col gap-4 items-center max-h-[60vh] overflow-y-auto scrollbar-hide">
                <!-- Populated dynamically -->
            </div>
            <a id="nextLink" href="#" class="mt-6 flex items-center justify-center w-10 h-10 rounded-full bg-[#8B7EC8] text-white hover:bg-[#6B6B7D] transition opacity-40 pointer-events-none" title="Next Memory">
                <i class="fas fa-chevron-down"></i>
            </a>
        </aside>
        
        <main class="flex-1 flex flex-col items-center justify-center px-2 py-8">
            <div id="contentWrapper" class="w-full max-w-4xl mx-auto flex flex-col gap-8 items-center hidden">
                <div class="w-full flex flex-col md:flex-row gap-8">
                    <section class="flex-1 bg-white/90 rounded-3xl shadow-2xl p-8 flex flex-col gap-4 min-h-[520px]">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="w-16 h-16 rounded-full bg-[#A8C8EC] flex items-center justify-center text-2xl font-bold text-white border-4 border-[#8B7EC8]">
                                <i class="fa-solid fa-book-open"></i>
                            </div>
                            <div>
                                <h1 id="memTitle" class="text-3xl font-bold text-gray-900 leading-tight mb-1"></h1>
                                <div id="memDate" class="flex items-center text-gray-500 text-base mb-1">
                                    <i class="fa-regular fa-calendar mr-2"></i><span></span>
                                </div>
                                <div id="memMood" class="flex items-center text-gray-500 text-base mb-1 hidden">
                                    <i class="fas fa-smile mr-2"></i><span></span>
                                </div>
                                <div id="memLocation" class="flex items-center text-gray-500 text-base mb-1 hidden">
                                    <i class="fa-solid fa-location-dot mr-2"></i><a href="#" target="_blank" class="text-[#8B7EC8] hover:underline"></a>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-end mb-2">
                            <button id="deleteBtn" class="delete-btn"><i class="fas fa-trash"></i> Delete Memory</button>
                        </div>
                        <div class="mb-2">
                            <span class="font-semibold text-gray-700">Description</span>
                            <div id="memDesc" class="text-gray-700 mt-1 text-base leading-relaxed bg-[#F5F3FB] rounded-xl p-4 border border-[#E8E3F5]"></div>
                        </div>
                        <div id="memTags" class="flex flex-wrap gap-2 mb-2 hidden"></div>
                        <div class="text-gray-600 mb-2"><strong>Friends included:</strong> <span id="memFriends">No friends included</span></div>
                    </section>
                    
                    <section class="flex-1 bg-white rounded-3xl shadow-lg p-8 flex flex-col gap-6 min-h-[520px]">
                        <h2 class="text-xl font-semibold text-[#8B7EC8] mb-2 flex items-center gap-2"><i class="fa-regular fa-images"></i> Memory Media</h2>
                        <div class="w-full flex flex-col items-center mb-6">
                            <div id="mediaGallery" class="media-gallery w-full flex flex-col items-center">
                                <!-- Slides populated here -->
                            </div>
                            <div class="flex gap-4 mt-4 hidden" id="galleryControls">
                                <button id="prevSlide" class="px-3 py-1 bg-[#ede9fe] text-[#7c3aed] rounded-lg font-semibold"><i class="fa fa-chevron-left"></i> Prev</button>
                                <button id="nextSlide" class="px-3 py-1 bg-[#ede9fe] text-[#7c3aed] rounded-lg font-semibold">Next <i class="fa fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </section>
                </div>
                <section class="w-full bg-white/80 rounded-2xl shadow-lg p-6 mt-6">
                    <h2 class="text-lg font-semibold text-[#8B7EC8] mb-2 flex items-center gap-2"><i class="fa fa-info-circle"></i> Memory Details</h2>
                    <dl id="extraDetails" class="divide-y divide-[#E8E3F5]"></dl>
                </section>
                <div class="mt-4">
                    <a href="/dashboard.html" class="inline-block px-6 py-2 bg-[#8B7EC8] text-white rounded-xl hover:bg-[#6BCB77] transition">Back to Dashboard</a>
                </div>
            </div>
            <div id="loading" class="text-gray-500 mt-10 text-xl">Loading...</div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/app.js"></script>
    <script src="/js/client_memory_details.js"></script>
</body>
</html>
