<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Share a Memory - MemoryBook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body { font-family: 'Quicksand', sans-serif; }
    .font-kalam { font-family: 'Kalam', cursive !important; }
    .blobs-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #FDE8E8; opacity: 0.6; }
  </style>
</head>
<body class="bg-[#FDE8E8]/60 min-h-screen">
<div class="blobs-bg"></div>
<div id="navbar-container"></div>
<main class="flex flex-col items-center justify-center min-h-[80vh] py-8 px-2" id="mainApp" style="display:none;">
  <div class="w-full max-w-xl">
    <div class="bg-white rounded-2xl shadow-lg border border-[#F4A6A6]/30 p-8 mb-8">
      <h1 class="text-3xl font-bold text-center text-[#8B7EC8] mb-6 flex items-center justify-center gap-2">
        <i class="fas fa-share-alt"></i> Share a Memory
      </h1>
      <div id="successMsg" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-xl mb-6 text-center hidden">
        Memory shared successfully!
      </div>
      <div id="errorMsg" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-6 text-center hidden"></div>
      
      <!-- Step 1: Search -->
      <div id="step1">
          <h2 class="text-xl font-semibold text-[#2D2A3D] mb-4">Step 1: Choose a Friend</h2>
          <form class="space-y-6" autocomplete="off" id="user-search-form">
            <label for="userSearchInput" class="block text-sm font-medium text-[#2D2A3D]">Search for a user</label>
            <input id="userSearchInput" type="text" placeholder="Type username or email..." class="rounded-xl border border-gray-200 p-3 focus:ring-2 focus:ring-[#F4A6A6] focus:border-[#F4A6A6] w-full" autocomplete="off" autofocus />
            <div id="userSuggestions" class="space-y-2 mt-2 max-h-40 overflow-y-auto"></div>
            <input type="hidden" id="selectedUserEmail" />
            <input type="hidden" id="selectedUserName" />
            <div class="flex justify-end">
              <button type="button" id="continueBtn" class="px-10 py-3 rounded-xl bg-[#F4A6A6] text-white font-semibold shadow hover:bg-[#D1C7EB] hover:text-[#2D2A3D] focus:outline-none focus:ring-2 focus:ring-[#F4A6A6] transition">
                Continue
              </button>
            </div>
          </form>
      </div>

      <!-- Step 2: Share -->
      <div id="step2" class="hidden">
        <h2 class="text-xl font-semibold text-[#2D2A3D] mb-4">Step 2: Share a Memory with <span class="text-[#8B7EC8]" id="displaySelectedUser"></span></h2>
        <div class="flex items-center gap-4 mb-4 p-4 rounded-xl bg-[#F5F3FB] border border-[#F4A6A6]/30">
          <div>
            <div class="font-semibold text-[#8B7EC8] text-lg" id="displayUsername"></div>
            <div class="text-xs text-gray-500" id="displayEmail"></div>
          </div>
        </div>
        <form class="space-y-6" autocomplete="off" id="shareForm">
          <div>
            <label class="block text-[#2D2A3D] font-semibold mb-2">Select a Memory to Share <span class="text-gray-400">(optional)</span></label>
            <select id="selected_memory_id" class="rounded-xl border border-gray-200 p-3 focus:ring-2 focus:ring-[#F4A6A6] focus:border-[#F4A6A6] w-full">
              <option value="">-- Choose a memory (optional) --</option>
            </select>
          </div>
          <div id="memoryPreview" class="border rounded-xl p-4 bg-[#E6F1FB] mb-2 hidden">
            <img id="memImg" src="" class="w-32 h-32 object-cover rounded-xl border mb-2 mx-auto hidden" alt="Memory Image">
            <div class="font-bold text-lg text-[#8B7EC8] mb-1" id="memTitle"></div>
            <div class="text-gray-500 text-sm mb-1" id="memDate"></div>
            <div class="text-gray-700 text-base mb-1" id="memDesc"></div>
          </div>
          <div>
            <label class="block text-[#2D2A3D] font-semibold mb-2">Memory Title</label>
            <input type="text" id="memory_title" class="rounded-xl border border-gray-200 p-3 focus:ring-2 focus:ring-[#F4A6A6] focus:border-[#F4A6A6] w-full" placeholder="Memory Title" required>
          </div>
          <div>
            <label class="block text-[#2D2A3D] font-semibold mb-2">Message/Description</label>
            <textarea id="message" class="rounded-xl border border-gray-200 p-3 focus:ring-2 focus:ring-[#F4A6A6] focus:border-[#F4A6A6] w-full" rows="4" placeholder="Describe your memory..." required></textarea>
          </div>
          <div>
            <label class="block text-[#2D2A3D] font-semibold mb-2">Date</label>
            <input type="date" id="date" class="rounded-xl border border-gray-200 p-3 focus:ring-2 focus:ring-[#F4A6A6] focus:border-[#F4A6A6] w-full" required>
          </div>
          <div>
            <label class="block text-[#2D2A3D] font-semibold mb-2">Attachment (optional)</label>
            <input type="file" id="attachments" class="rounded-xl border border-gray-200 p-3 focus:ring-2 focus:ring-[#F4A6A6] focus:border-[#F4A6A6] w-full" accept="image/*,video/*,audio/*" multiple>
          </div>
          <div class="flex justify-end mt-2">
            <button type="submit" class="px-10 py-3 rounded-xl bg-[#F4A6A6] text-white font-semibold shadow hover:bg-[#D1C7EB] hover:text-[#2D2A3D] focus:outline-none focus:ring-2 focus:ring-[#F4A6A6] transition text-lg flex items-center gap-2">
              Share Memory
            </button>
          </div>
        </form>
        <div class="mt-4 text-center">
          <button type="button" id="backToSearchBtn" class="text-[#8B7EC8] underline">&larr; Search for a different user</button>
        </div>
      </div>
    </div>
    
    <!-- Recent Shared -->
    <div class="bg-white rounded-2xl shadow-lg border border-[#F4A6A6]/30 p-8 mt-8">
      <h2 class="text-lg font-bold text-[#8B7EC8] mb-4 flex items-center gap-2"><i class="fas fa-history"></i> Recently Shared</h2>
      <ul class="space-y-4" id="recentSharedList">
        <div class="text-gray-400 text-center py-4">Loading recent...</div>
      </ul>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/app.js"></script>
<script src="/js/client_shared_memories.js"></script>
</body>
</html>
