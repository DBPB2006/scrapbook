<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shared Memory - MemoryBook</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/output.css">
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html, body { font-family: 'Quicksand', sans-serif; }
    .gallery-img { transition: box-shadow 0.2s; }
    .gallery-img:hover { box-shadow: 0 8px 24px rgba(139,126,200,0.18); }
    .blobs-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fafafa; }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-pink-50 min-h-screen overflow-x-hidden">
<div class="blobs-bg"></div>
<div id="navbar-container"></div>
<div class="flex min-h-screen pt-8" id="appContent" style="display:none;">
  <!-- Sidebar -->
  <aside class="w-24 flex flex-col items-center py-8 px-2 z-10 bg-[#F5F3FB] rounded-tr-3xl rounded-br-3xl shadow-lg border-r border-[#E8E3F5]" id="sidebarMemories">
  </aside>
  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-center px-2 py-8">
    <div class="w-full max-w-4xl mx-auto flex flex-col gap-8 items-center" id="memDetails">
      <div class="w-full flex flex-col md:flex-row gap-8">
        <!-- Memory Info Card -->
        <section class="flex-1 bg-white/90 rounded-3xl shadow-2xl p-8 flex flex-col gap-4 min-h-[520px]">
          <div class="flex items-center gap-4 mb-2">
            <div class="w-16 h-16 rounded-full bg-[#A8C8EC] flex items-center justify-center text-2xl font-bold text-white border-4 border-[#8B7EC8]">
              <i class="fa-solid fa-book-open"></i>
            </div>
            <div>
              <h1 class="text-3xl font-bold text-gray-900 leading-tight mb-1" id="mTitle">Memory</h1>
              <div class="flex items-center text-gray-500 text-base mb-1">
                <i class="fa-regular fa-calendar mr-2"></i>
                <span id="mDate"></span>
              </div>
              <div id="memMood" class="flex items-center text-gray-500 text-base mb-1 hidden">
                  <i class="fas fa-smile mr-2"></i><span id="mMoodText"></span>
              </div>
              <div id="memLocation" class="flex items-center text-gray-500 text-base mb-1 hidden">
                  <i class="fa-solid fa-location-dot mr-2"></i><a href="#" target="_blank" class="text-[#8B7EC8] hover:underline" id="mLocText"></a>
              </div>
            </div>
          </div>
          <div class="mb-2">
            <span class="font-semibold text-gray-700">Description</span>
            <div class="text-gray-700 mt-1 text-base leading-relaxed bg-[#F5F3FB] rounded-xl p-4 border border-[#E8E3F5]" id="mDesc"></div>
          </div>
          <div class="mb-2" id="mMsgContainer" style="display:none;">
            <span class="font-semibold text-gray-700">Shared Message</span>
            <div class="text-gray-700 mt-1 text-base leading-relaxed" id="mMsg"></div>
          </div>
          <div id="memTags" class="flex flex-wrap gap-2 mb-2 hidden"></div>
          <div class="text-gray-600 mb-2" id="memFriendsContainer" style="display:none;"><strong>Shared with:</strong> <span id="memFriends"></span></div>
          <div class="text-gray-600 mb-2"><strong>Created by:</strong> <span id="mCreator"></span></div>
        </section>
        
        <!-- Gallery -->
        <section class="flex-1 bg-white rounded-3xl shadow-lg p-8 flex flex-col gap-6 min-h-[520px]">
          <h2 class="text-xl font-semibold text-[#8B7EC8] mb-2 flex items-center gap-2"><i class="fa-regular fa-images"></i> Media & Attachments</h2>
          <div class="w-full flex flex-col items-center mb-6">
            <div id="mediaGallery" class="media-gallery w-full flex flex-col items-center">
              <div class="text-center text-gray-400">No media files.</div>
            </div>
            <div class="flex gap-4 mt-4 hidden" id="galleryControls">
                <button id="prevSlide" class="px-3 py-1 bg-[#ede9fe] text-[#7c3aed] rounded-lg font-semibold"><i class="fa fa-chevron-left"></i> Prev</button>
                <button id="nextSlide" class="px-3 py-1 bg-[#ede9fe] text-[#7c3aed] rounded-lg font-semibold">Next <i class="fa fa-chevron-right"></i></button>
            </div>
          </div>
        </section>
      </div>
      <section class="w-full bg-[#F5F3FB] rounded-2xl shadow-lg p-6 mt-6 border border-[#E8E3F5] hidden" id="mDescSection">
        <h2 class="text-lg font-semibold text-[#8B7EC8] mb-2 flex items-center gap-2"><i class="fa fa-align-left"></i> User Description</h2>
        <div class="text-gray-700 text-base leading-relaxed whitespace-pre-line" id="mUserDesc"></div>
      </section>
      <section class="w-full bg-white/80 rounded-2xl shadow-lg p-6 mt-6 hidden" id="extraDetailsSection">
        <h2 class="text-lg font-semibold text-[#8B7EC8] mb-2 flex items-center gap-2"><i class="fa fa-info-circle"></i> Memory Details</h2>
        <dl id="extraDetails" class="divide-y divide-[#E8E3F5]"></dl>
      </section>
      <div class="mt-4">
        <a href="/dashboard.html" class="inline-block px-6 py-2 bg-[#8B7EC8] text-white rounded-xl hover:bg-[#6BCB77] transition">Back to Dashboard</a>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/app.js"></script>
<script src="/js/client_view_shared_memory.js"></script>
</body>
</html>
