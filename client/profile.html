<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile - MemoryBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; }
        .avatar-container {
            width: 8rem; height: 8rem;
            border-radius: 9999px;
            background: linear-gradient(135deg, #A8C8EC 0%, #FDE8E8 100%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(139, 126, 200, 0.3);
            position: relative;
            overflow: hidden;
            border: 4px solid white;
        }
        .avatar-container:hover .avatar-overlay {
            opacity: 1;
        }
        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
        }
        .blobs-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #fafafa; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#F5F3FB] to-[#F4F8FD] min-h-screen relative">
    <div class="blobs-bg"></div>
    
    <div id="navbar-container"></div>

    <main class="max-w-4xl mx-auto px-4 py-8 relative z-10">
        <div class="mb-8">
            <h1 class="text-3xl font-semibold text-[#2D2A3D] mb-2">Account Settings</h1>
            <p class="text-lg text-[#6B6B7D]">Manage your profile and preferences</p>
        </div>

        <div id="message-container" class="hidden mb-6 flex items-center shadow-sm px-4 py-3 rounded-xl"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Avatar & Quick Actions -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-[#E8E3F5] text-center flex flex-col items-center">
                    <form id="avatarForm">
                        <div class="avatar-container mb-4">
                            <img id="avatarImg" src="" alt="Profile avatar" class="w-full h-full object-cover">
                            <label class="avatar-overlay">
                                <i class="fas fa-camera"></i>
                                <input type="file" id="profilePic" accept="image/*" class="hidden">
                            </label>
                        </div>
                    </form>
                    <h2 id="displayFullName" class="text-xl font-bold text-[#2D2A3D]"></h2>
                    <p id="displayUsername" class="text-[#6B6B7D] text-sm"></p>
                </div>

                <div class="bg-white rounded-2xl p-6 shadow-sm border border-[#E8E3F5]">
                    <h3 class="text-lg font-semibold text-[#2D2A3D] mb-4">Danger Zone</h3>
                    <button id="deleteAccountBtn" class="w-full py-2.5 bg-red-50 text-red-600 rounded-xl font-medium hover:bg-red-100 transition border border-red-100">
                        Delete Account
                    </button>
                </div>
            </div>

            <!-- Right Column: Forms & Data -->
            <div class="lg:col-span-2 space-y-8">
                
                <!-- Profile Information -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-[#E8E3F5]">
                    <h3 class="text-xl font-semibold text-[#2D2A3D] mb-6">Profile Information</h3>
                    <form id="profileForm" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">First Name</label>
                                <input type="text" id="first_name" name="first_name" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">Last Name</label>
                                <input type="text" id="last_name" name="last_name" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">Username</label>
                            <input type="text" id="username" name="username" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">Email</label>
                            <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                        </div>
                        
                        <div class="pt-4 flex justify-end">
                            <button type="submit" class="px-6 py-2.5 bg-[#8B7EC8] text-white rounded-xl font-medium hover:bg-[#7A6BB5] transition shadow-sm">
                                Save Profile
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Password Settings -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-[#E8E3F5]">
                    <h3 class="text-xl font-semibold text-[#2D2A3D] mb-6">Change Password</h3>
                    <form id="passwordForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">Current Password</label>
                            <input type="password" id="old_password" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">New Password</label>
                                <input type="password" id="new_password" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-[#6B6B7D] mb-1">Confirm New Password</label>
                                <input type="password" id="confirm_password" class="w-full px-4 py-2 border border-[#E8E3F5] rounded-xl focus:ring-2 focus:ring-[#8B7EC8] focus:border-transparent outline-none transition" required />
                            </div>
                        </div>
                        
                        <div class="pt-4 flex justify-end">
                            <button type="submit" class="px-6 py-2.5 bg-gray-100 text-[#2D2A3D] rounded-xl font-medium hover:bg-gray-200 transition">
                                Update Password
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Friends List -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-[#E8E3F5]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-semibold text-[#2D2A3D]">Your Friends</h3>
                        <a href="/friends/add_friend.html" class="text-sm text-[#8B7EC8] hover:underline font-medium">Find Friends</a>
                    </div>
                    <div id="friendsList" class="space-y-3">
                        <!-- Populated dynamically -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/app.js"></script>
    <script src="/js/client_profile.js"></script>
</body>
</html>
