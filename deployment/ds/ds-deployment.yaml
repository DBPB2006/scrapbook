apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ds
  template:
    metadata:
      labels:
        app: ds
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
      - name: ds
        image: 929140636859.dkr.ecr.ap-south-1.amazonaws.com/scrapbook-ds:latest
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: ds-config
        - secretRef:
            name: scrapbook-secrets
