version: '3.8'

services:
  gateway-service:
    build: ./gateway-service
    container_name: scrapbook_gateway
    ports:
      - "3090:3090"
    volumes:
      - ./client:/usr/src/app/pages
      - ./uploads:/usr/src/app/uploads
    depends_on:
      - auth-service
      - memories-service
      - social-service
      - sharing-service
      - ds-service

  auth-service:
    build: ./auth-service
    container_name: scrapbook_auth
    volumes:
      - ./auth-service/data:/usr/src/app/data
      - ./auth-service/ds:/usr/src/app/ds
      - ./uploads:/usr/src/app/uploads

  memories-service:
    build: ./memories-service
    container_name: scrapbook_memories
    volumes:
      - ./memories-service/data:/usr/src/app/data
      - ./memories-service/ds:/usr/src/app/ds
      - ./uploads:/usr/src/app/uploads

  social-service:
    build: ./social-service
    container_name: scrapbook_social
    volumes:
      - ./social-service/data:/usr/src/app/data
      - ./social-service/ds:/usr/src/app/ds
      - ./uploads:/usr/src/app/uploads

  sharing-service:
    build: ./sharing-service
    container_name: scrapbook_sharing
    volumes:
      - ./sharing-service/data:/usr/src/app/data
      - ./sharing-service/ds:/usr/src/app/ds
      - ./uploads:/usr/src/app/uploads

  ds-service:
    build: ./ds-service
    container_name: scrapbook_ds
    ports:
      - "3005:3005"
